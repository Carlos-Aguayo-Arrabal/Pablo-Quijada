# Nginx reverse proxy para TrainTools (Next.js en localhost:3000 via PM2)
# Instalar en /etc/nginx/sites-available/traintools.conf y enlazar:
#   sudo ln -s /etc/nginx/sites-available/traintools.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# Luego activar SSL con certbot (reescribe este archivo automáticamente):
#   sudo certbot --nginx -d traintools.es -d www.traintools.es

server {
    listen 80;
    listen [::]:80;
    server_name traintools.es www.traintools.es;

    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
